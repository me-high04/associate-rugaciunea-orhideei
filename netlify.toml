[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "."

[dev]
  command = "npm start"
  port = 3000

[[redirects]]
  from = "/create-payment-intent"
  to = "/.netlify/functions/create-payment-intent"
  status = 200

[context.production]
  environment = { NODE_ENV = "production" }
